version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
customHeaders:
  - pattern: "**/*"
    headers:
      - key: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
